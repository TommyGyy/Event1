<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>一号链接倒计时</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg-start: #0a0a1a;
  --bg-end: #1a0a2e;
  --card-bg: rgba(255,255,255,0.06);
  --text: #e0d6f0;
  --text-secondary: rgba(224,214,240,0.6);
  --accent: #c084fc;
  --accent-glow: 0 0 20px rgba(192,132,252,0.5), 0 0 60px rgba(192,132,252,0.2);
  --accent-text-glow: 0 0 10px rgba(192,132,252,0.6), 0 0 30px rgba(192,132,252,0.3);
  --btn-bg: rgba(192,132,252,0.2);
  --btn-active: #c084fc;
  --divider: rgba(255,255,255,0.1);
  --toggle-bg: rgba(255,255,255,0.15);
  --toggle-dot: #c084fc;
}

body.warm {
  --bg-start: #1a0a00;
  --bg-end: #331100;
  --card-bg: rgba(255,255,255,0.06);
  --text: #f0d8b8;
  --text-secondary: rgba(240,216,184,0.6);
  --accent: #f59e0b;
  --accent-glow: 0 0 20px rgba(245,158,11,0.5), 0 0 60px rgba(245,158,11,0.2);
  --accent-text-glow: 0 0 10px rgba(245,158,11,0.6), 0 0 30px rgba(245,158,11,0.3);
  --btn-bg: rgba(245,158,11,0.2);
  --btn-active: #f59e0b;
  --divider: rgba(255,255,255,0.1);
  --toggle-bg: rgba(255,255,255,0.15);
  --toggle-dot: #f59e0b;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: linear-gradient(135deg, var(--bg-start), var(--bg-end));
  color: var(--text);
  min-height: 100dvh;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  padding: 24px 16px;
}

.container {
  width: 100%;
  max-width: 400px;
}

.title {
  text-align: center;
  font-size: 20px;
  font-weight: 600;
  letter-spacing: 2px;
  color: var(--accent);
  text-shadow: var(--accent-text-glow);
  margin-bottom: 20px;
}

/* countdown section */
.countdown-section {
  text-align: center;
  margin-bottom: 16px;
}

.timer {
  display: flex;
  justify-content: center;
  align-items: baseline;
  gap: 4px;
  margin-bottom: 6px;
}

.timer-digit {
  font-size: clamp(40px, 12vw, 72px);
  font-weight: 700;
  font-variant-numeric: tabular-nums;
  color: var(--accent);
  text-shadow: var(--accent-text-glow);
  min-width: 2ch;
  text-align: center;
  letter-spacing: 2px;
}

.timer-sep {
  font-size: clamp(32px, 10vw, 56px);
  color: var(--accent);
  opacity: 0.7;
}

.timer-labels {
  display: flex;
  justify-content: center;
  gap: 4px;
  font-size: 13px;
  color: var(--text-secondary);
  letter-spacing: 1px;
}

.timer-labels span {
  text-align: center;
}

.timer-labels span:nth-child(odd) {
  min-width: 2ch;
}

.timer-labels span:nth-child(even) {
  width: clamp(12px, 4vw, 18px);
}

.settings-trigger {
  display: inline-block;
  margin-top: 12px;
  font-size: 13px;
  color: var(--accent);
  cursor: pointer;
  padding: 10px 20px;
  min-height: 44px;
  border-radius: 20px;
  background: var(--btn-bg);
  user-select: none;
  -webkit-tap-highlight-color: transparent;
}

/* theme toggle */
.theme-row {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 10px;
  margin-bottom: 20px;
  font-size: 13px;
  color: var(--text-secondary);
}

.toggle {
  width: 52px;
  height: 32px;
  border-radius: 16px;
  background: var(--toggle-bg);
  cursor: pointer;
  position: relative;
  transition: background 0.3s;
  -webkit-tap-highlight-color: transparent;
}

.toggle::after {
  content: "";
  position: absolute;
  top: 3px;
  left: 3px;
  width: 26px;
  height: 26px;
  border-radius: 50%;
  background: var(--toggle-dot);
  transition: transform 0.3s;
}

body.warm .toggle::after {
  transform: translateX(20px);
}

/* activity list */
.activity-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin-bottom: 12px;
}

.activity-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: var(--card-bg);
  border: 1px solid var(--divider);
  border-radius: 10px;
  padding: 12px 14px;
  font-size: 15px;
}

.activity-item .text {
  flex: 1;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}

.activity-item .actions {
  display: flex;
  gap: 8px;
  flex-shrink: 0;
  margin-left: 8px;
}

.activity-item .actions button {
  width: 44px;
  height: 44px;
  border: none;
  border-radius: 50%;
  background: rgba(255,255,255,0.1);
  color: var(--text-secondary);
  font-size: 14px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  -webkit-tap-highlight-color: transparent;
}

.activity-item .actions button:active {
  background: var(--btn-bg);
  color: var(--accent);
}

/* activity edit input */
.activity-item input {
  flex: 1;
  background: rgba(255,255,255,0.1);
  border: 1px solid var(--accent);
  border-radius: 6px;
  color: var(--text);
  font-size: 15px;
  padding: 6px 10px;
  outline: none;
  font-family: inherit;
}

.add-btn {
  width: 100%;
  padding: 12px;
  border: 1px dashed var(--divider);
  border-radius: 10px;
  background: transparent;
  color: var(--text-secondary);
  font-size: 15px;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}

.add-btn:active {
  background: var(--card-bg);
  color: var(--accent);
}

/* modal overlay */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  display: flex;
  align-items: flex-end;
  justify-content: center;
  z-index: 100;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.25s;
}

.modal-overlay.active {
  opacity: 1;
  pointer-events: auto;
}

.modal {
  width: 100%;
  max-width: 400px;
  background: linear-gradient(135deg, #12122a, #1a1030);
  border-radius: 16px 16px 0 0;
  padding: 24px 20px 32px;
  transform: translateY(100%);
  transition: transform 0.3s;
}

body.warm .modal {
  background: linear-gradient(135deg, #1a1005, #2a1508);
}

.modal-overlay.active .modal {
  transform: translateY(0);
}

.modal h3 {
  font-size: 18px;
  color: var(--accent);
  margin-bottom: 20px;
  text-align: center;
}

.modal .field-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 16px;
}

.modal .field-row label {
  font-size: 14px;
  color: var(--text-secondary);
  min-width: 24px;
  text-align: center;
}

.modal .field-row input {
  flex: 1;
  background: rgba(255,255,255,0.08);
  border: 1px solid var(--divider);
  border-radius: 8px;
  color: var(--text);
  font-size: 20px;
  text-align: center;
  padding: 8px;
  outline: none;
  font-variant-numeric: tabular-nums;
  font-family: inherit;
}

.modal .field-row input:focus {
  border-color: var(--accent);
}

.modal .theme-options {
  display: flex;
  gap: 8px;
  margin-bottom: 20px;
}

.modal .theme-options button {
  flex: 1;
  padding: 10px;
  border-radius: 8px;
  border: 2px solid var(--divider);
  background: var(--card-bg);
  color: var(--text);
  font-size: 14px;
  cursor: pointer;
  transition: border-color 0.2s, background 0.2s;
  -webkit-tap-highlight-color: transparent;
}

.modal .theme-options button.active-theme {
  border-color: var(--accent);
  background: var(--btn-bg);
  color: var(--accent);
}

.modal .ctrl-btns {
  display: flex;
  gap: 8px;
}

.modal .ctrl-btns button {
  flex: 1;
  padding: 12px 8px;
  border-radius: 10px;
  border: none;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  color: #fff;
  min-height: 44px;
  -webkit-tap-highlight-color: transparent;
}

.modal .ctrl-btns .btn-start {
  background: var(--accent);
}

.modal .ctrl-btns .btn-pause {
  background: rgba(255,255,255,0.12);
  color: var(--text);
}

.modal .ctrl-btns .btn-reset {
  background: rgba(255,255,255,0.12);
  color: var(--text);
}
</style>
</head>
<body>
<div class="container">
  <div class="title">一号链接倒计时</div>

  <div class="countdown-section">
    <div class="timer">
      <span class="timer-digit" id="h">02</span>
      <span class="timer-sep">:</span>
      <span class="timer-digit" id="m">30</span>
      <span class="timer-sep">:</span>
      <span class="timer-digit" id="s">00</span>
    </div>
    <div class="timer-labels">
      <span>时</span>
      <span></span>
      <span>分</span>
      <span></span>
      <span>秒</span>
    </div>
    <div class="settings-trigger" id="settingsBtn">⚙ 设置</div>
  </div>

  <div class="theme-row">
    <span>🌙 暗夜舞台</span>
    <div class="toggle" id="themeToggle"></div>
    <span>🔥 篝火暖色</span>
  </div>

  <div class="activity-list" id="activityList"></div>
  <button class="add-btn" id="addBtn">+ 添加活动</button>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h3>⚙ 倒计时设置</h3>
    <div class="field-row">
      <label>时</label>
      <input type="number" id="inputH" min="0" max="99" value="2" inputmode="numeric">
      <label>分</label>
      <input type="number" id="inputM" min="0" max="59" value="30" inputmode="numeric">
      <label>秒</label>
      <input type="number" id="inputS" min="0" max="59" value="0" inputmode="numeric">
    </div>
    <div class="theme-options">
      <button id="themeDark" class="active-theme">🌙 暗夜</button>
      <button id="themeWarm">🔥 篝火</button>
    </div>
    <div class="ctrl-btns">
      <button class="btn-start" id="btnStart">▶ 开始</button>
      <button class="btn-pause" id="btnPause">⏸ 暂停</button>
      <button class="btn-reset" id="btnReset">↺ 重置</button>
    </div>
  </div>
</div>
<script>
// --- state ---
let totalSeconds = 9000; // default 2h30m
let remainingSeconds = totalSeconds;
let timerId = null;

const STORAGE_KEY = 'countdown_state';

function saveState() {
  try {
    const state = {
      totalSeconds: totalSeconds,
      remainingSeconds: remainingSeconds,
      activities: activities,
      theme: document.body.classList.contains('warm') ? 'warm' : 'dark',
      running: !!timerId
    };
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  } catch(e) {
    // localStorage full or unavailable
  }
}

window.addEventListener('beforeunload', saveState);

function loadState() {
  const raw = localStorage.getItem(STORAGE_KEY);
  if (!raw) return false;
  try {
    const state = JSON.parse(raw);
    totalSeconds = state.totalSeconds != null ? state.totalSeconds : 9000;
    remainingSeconds = state.remainingSeconds != null ? state.remainingSeconds : totalSeconds;
    activities = state.activities && state.activities.length > 0 ? state.activities : [...defaultActivities];
    setTheme(state.theme || 'dark');
    if (state.running && remainingSeconds > 0) {
      timerId = setInterval(tick, 1000);
    }
    return true;
  } catch(e) {
    return false;
  }
}

const $h = document.getElementById('h');
const $m = document.getElementById('m');
const $s = document.getElementById('s');
const $btnStart = document.getElementById('btnStart');
const $btnPause = document.getElementById('btnPause');
const $btnReset = document.getElementById('btnReset');
const $inputH = document.getElementById('inputH');
const $inputM = document.getElementById('inputM');
const $inputS = document.getElementById('inputS');
const $overlay = document.getElementById('modalOverlay');

// --- modal ---
const $settingsBtn = document.getElementById('settingsBtn');

function openModal() {
  $overlay.classList.add('active');
}

function closeModal() {
  $overlay.classList.remove('active');
}

$settingsBtn.addEventListener('click', openModal);
$overlay.addEventListener('click', function(e) {
  if (e.target === $overlay) closeModal();
});

function pad(n) { return String(n).padStart(2, '0'); }

function renderTimer() {
  const hh = Math.floor(remainingSeconds / 3600);
  const mm = Math.floor((remainingSeconds % 3600) / 60);
  const ss = remainingSeconds % 60;
  $h.textContent = pad(hh);
  $m.textContent = pad(mm);
  $s.textContent = pad(ss);
  const totalH = Math.floor(totalSeconds / 3600);
  const totalM = Math.floor((totalSeconds % 3600) / 60);
  const totalS = totalSeconds % 60;
  if (!$overlay.classList.contains('active')) {
    $inputH.value = totalH;
    $inputM.value = totalM;
    $inputS.value = totalS;
  }
}

function applySettings() {
  const h = Math.max(0, parseInt($inputH.value) || 0);
  const mn = Math.min(59, Math.max(0, parseInt($inputM.value) || 0));
  const sc = Math.min(59, Math.max(0, parseInt($inputS.value) || 0));
  totalSeconds = h * 3600 + mn * 60 + sc;
  remainingSeconds = totalSeconds;
  renderTimer();
  saveState();
}

function tick() {
  if (remainingSeconds <= 0) {
    pauseTimer();
    return;
  }
  remainingSeconds--;
  renderTimer();
}

function startTimer() {
  if (remainingSeconds <= 0) return;
  if (timerId) return;
  if (remainingSeconds === totalSeconds) {
    applySettings();
  }
  timerId = setInterval(tick, 1000);
}

function pauseTimer() {
  if (timerId) { clearInterval(timerId); timerId = null; }
}

function resetTimer() {
  pauseTimer();
  remainingSeconds = totalSeconds;
  renderTimer();
  saveState();
}

$btnStart.addEventListener('click', startTimer);
$btnPause.addEventListener('click', pauseTimer);
$btnReset.addEventListener('click', resetTimer);

// update input -> auto apply
[$inputH, $inputM, $inputS].forEach(function(el) {
  el.addEventListener('change', applySettings);
});

// --- activities ---
const defaultActivities = ['烟花秀', '电音节', '星空大合唱', '灯光花海', '山体激光秀'];
const $list = document.getElementById('activityList');
const $addBtn = document.getElementById('addBtn');
let activities = [];

// 保持原有默认值，尝试加载持久化状态
if (!loadState()) {
  activities = [...defaultActivities];
}
renderTimer();
renderActivities();

function renderActivities() {
  $list.innerHTML = '';
  activities.forEach(function(item, i) {
    const div = document.createElement('div');
    div.className = 'activity-item';

    const text = document.createElement('span');
    text.className = 'text';
    text.textContent = item;
    text.addEventListener('click', function() { editActivity(i); });

    const actions = document.createElement('div');
    actions.className = 'actions';

    const editBtn = document.createElement('button');
    editBtn.textContent = '✏';
    editBtn.addEventListener('click', function() { editActivity(i); });

    const delBtn = document.createElement('button');
    delBtn.textContent = '✕';
    delBtn.addEventListener('click', function() { deleteActivity(i); });

    actions.appendChild(editBtn);
    actions.appendChild(delBtn);
    div.appendChild(text);
    div.appendChild(actions);
    $list.appendChild(div);
  });
}

function editActivity(index) {
  var items = $list.querySelectorAll('.activity-item');
  var item = items[index];
  var textEl = item.querySelector('.text');
  var actionsEl = item.querySelector('.actions');

  var input = document.createElement('input');
  input.value = activities[index];

  var save = function() {
    var val = input.value.trim();
    if (val) {
      activities[index] = val;
      saveState();
    }
    renderActivities();
  };

  input.addEventListener('blur', save);
  input.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') { input.blur(); }
  });

  textEl.replaceWith(input);
  actionsEl.style.display = 'none';
  input.focus();
}

function deleteActivity(index) {
  if (!confirm('确定删除"' + activities[index] + '"？')) return;
  activities.splice(index, 1);
  renderActivities();
  saveState();
}

$addBtn.addEventListener('click', function() {
  activities.push('');
  renderActivities();
  // After rendering, immediately edit the last (new) item
  var lastIdx = activities.length - 1;
  var items = $list.querySelectorAll('.activity-item');
  var item = items[lastIdx];
  var textEl = item.querySelector('.text');
  var actionsEl = item.querySelector('.actions');

  var input = document.createElement('input');
  input.placeholder = '输入活动名称';

  var save = function() {
    var val = input.value.trim();
    if (val) {
      activities[lastIdx] = val;
      saveState();
    } else {
      activities.splice(lastIdx, 1);
    }
    renderActivities();
  };

  input.addEventListener('blur', save);
  input.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') { input.blur(); }
  });

  textEl.replaceWith(input);
  actionsEl.style.display = 'none';
  input.focus();
});

// --- theme ---
const $themeToggle = document.getElementById('themeToggle');
const $themeDark = document.getElementById('themeDark');
const $themeWarm = document.getElementById('themeWarm');

function setTheme(theme) {
  if (theme === 'warm') {
    document.body.classList.add('warm');
    $themeDark.classList.remove('active-theme');
    $themeWarm.classList.add('active-theme');
  } else {
    document.body.classList.remove('warm');
    $themeDark.classList.add('active-theme');
    $themeWarm.classList.remove('active-theme');
  }
}

$themeToggle.addEventListener('click', function() {
  const next = document.body.classList.contains('warm') ? 'dark' : 'warm';
  setTheme(next);
  saveState();
});

$themeDark.addEventListener('click', function() { setTheme('dark'); saveState(); });
$themeWarm.addEventListener('click', function() { setTheme('warm'); saveState(); });

</script>
</body>
</html>
